<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <script src="https://kit.fontawesome.com/yourcode.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }
        html,body{
            display:grid;
            height:100%;
            place-items:center;
            text-align:center;
            /* background:#000; */
        }
        .container{
            width:450px;
            background:#111;
            border:1px solid #444;
            border-radius:5px;
            padding:20px 25px;
        }
        .container .text{
            font-size:25px;
            color:#ccc;
            font-weight: 600;
            line-height: 35px;
        }
        .container .input-data{
            margin:20px 5px 15px 5px;
        }
        .input-data .display {
            height:50px;
            width:100%;
            display:flex;
            position: relative;
        }
        .input-data .display input {
            height:100%;
            width:100%;
            background : #222;
            border: 1px solid #333;
            padding:10px;
            font-size:17px;
            color:#eee;
            pointer-events: none;
            user-select:none;
        }
        .display  span{
            position: absolute;
            color:grey;
            font-size: 25px;
            cursor: pointer;
            z-index: 999;
            right:15px;
            top:90%;
            transform: translateY(-50%);
            color:grey;
            font-size: 25px;
            cursor:pointer;
            display:none;
        }
        .display span .fas{
            
        }
        .input-data button{
            height:45px;
            width:100%;
            display:block;
            outline: none;
            background:#1b1b1b;
            border:1px solid #444;
            color: #999;
            font-size: 17px;
            font-weight:uppercase;
            cursor:pointer;
            transition : all 0.4s ease;
            margin: 30px 0;
        }
        .input-data button:hover{
            background:#222;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text">Random Password Genrator <br>in HTML CSSJs </div>
        <div class="input-data">
            <div class="display">
                <input class="input-data"  type="text">
                <span class="far fa-copy"onclick="copy()"></span>
                <span class="fas fa-copy"onclick="copy()"></span>
            </div>
            <button>Generate Pasword</button>
        </div>
    </div>
    <script>
        const display = document.querySelector('input');
        const button = document.querySelector('button');
        const copyBtn = document.querySelector('span.far');
        const copyActive = document.querySelector('span.fas');
        let randomPassword = "";
        let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
        button.onclick=()=>{
            let i ;
            randomPassword="";
            copyBtn.style.display="none";
            copyActive.style.display ="block";
            for(i=0;i<16;i++){
                randomPassword+=chars.charAt(Math.floor(Math.random()*chars.length));
            }
            display.value = randomPassword;
        }
        function copy(){
            copyBtn.style.display="block";
            copyActive.style.display ="none";
            display.select();
            document.execCommand('copy');

        }
    </script>
</body>
</html>
